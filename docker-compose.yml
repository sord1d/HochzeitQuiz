version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: schuhspiel-backend
    restart: unless-stopped
    # Kein externer Port – Caddy übernimmt das Routing
    environment:
      - PORT=3001
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - schuhspiel-net

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_BACKEND_URL=${VITE_BACKEND_URL}
    container_name: schuhspiel-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - schuhspiel-net

  caddy:
    image: caddy:2-alpine
    container_name: schuhspiel-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    depends_on:
      - frontend
      - backend
    networks:
      - schuhspiel-net

networks:
  schuhspiel-net:
    name: schuhspiel-net

volumes:
  caddy_data:    # SSL-Zertifikate (persistent)
  caddy_config:  # Caddy-Konfigurationscache
