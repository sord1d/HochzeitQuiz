version: "3.9"

# Basis-Stack ohne Ports und ohne Reverse Proxy.
# Wird kombiniert mit:
#   docker-compose.caddy.yml  → automatisches HTTPS via Caddy
#   docker-compose.nginx.yml  → bestehender nginx-Proxy

services:
  backend:
    build:
      context: ./backend
    container_name: schuhspiel-backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - schuhspiel-net

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_BACKEND_URL=${VITE_BACKEND_URL}
    container_name: schuhspiel-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - schuhspiel-net

networks:
  schuhspiel-net:
    name: schuhspiel-net
